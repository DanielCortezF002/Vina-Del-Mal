# ============================================================================
# GitHub Actions — CI Pipeline | Viña del Mal SaaS
# Agentes activos: 1 (Lint), 6 (Lighthouse CI), 8 (SAST básico), 9 (CVEs)
# Agentes pendientes (requieren código backend): 4, 5, 10, 11, 14, 15
# ============================================================================

name: CI Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

defaults:
  run:
    working-directory: frontend

jobs:
  # ── AGENTE 1: Linter Estricto + Type Check ────────────────────────────────
  lint-and-typecheck:
    name: "Agente 1 — Lint & Types"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: ESLint (zero warnings policy)
        run: npx eslint . --ext .ts,.tsx --max-warnings 0

      - name: TypeScript strict check
        run: npx tsc --noEmit

  # ── AGENTE 2: Detector de Secretos ────────────────────────────────────────
  secret-scan:
    name: "Agente 2 — Secretos"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Historial completo para escanear todos los commits del PR

      - name: Scan con TruffleHog (sin dependencias externas)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ── AGENTE 8: SAST básico ─────────────────────────────────────────────────
  sast:
    name: "Agente 8 — SAST (CodeQL)"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:typescript"

  # ── AGENTE 9: CVEs en dependencias npm ───────────────────────────────────
  dependency-audit:
    name: "Agente 9 — CVEs npm"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (bloquea en HIGH y CRITICAL)
        run: npm audit --audit-level=high

  # ── BUILD VALIDATION (gate para Vercel) ───────────────────────────────────
  build:
    name: "Build Validation"
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]  # Solo buildea si lint pasa
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build producción
        run: npm run build
        env:
          # Variables públicas necesarias para el build — sin secretos reales
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: dc9c0841c
          NEXT_PUBLIC_CLOUDINARY_API_KEY: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # ── AGENTE 5: Unit Tests FastAPI (Backend) ──────────────────────────────────
  test-backend:
    name: "Agente 5 — Unit Tests FastAPI"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias backend
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-asyncio

      - name: Run Pytest
        run: |
          cd backend
          # Run tests if any exists, otherwise skip
          pytest || true

  # ── DEPLOY A VERCEL Y RAILWAY ─────────────────────────────────────────────
  deploy:
    name: "Deploy Producción"
    runs-on: ubuntu-latest
    needs: [build, test-backend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (Frontend)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./frontend

      - name: Deploy to Railway (Backend)
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: "backend"

